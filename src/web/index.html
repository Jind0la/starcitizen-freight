<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freight — SC Cargo Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
    <div class="bg-glow"></div>
    <div class="noise"></div>

    <div class="container">

        <!-- Header -->
        <header class="header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                </svg>
                <div>
                    <h1>FREIGHT</h1>
                    <span class="subtitle">Star Citizen Cargo Calculator</span>
                </div>
            </div>
            <div class="header-right">
                <span id="cacheStatus" class="cache-status">
                    <span class="cache-dot" id="cacheDot">●</span>
                    <span id="cacheLabel">Ready</span>
                </span>
                <button id="refreshBtn" class="btn-icon-only" title="Refresh data">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                        <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                    </svg>
                </button>
                <span id="lastUpdated" class="update-time"></span>
            </div>
        </header>

        <!-- Input Section -->
        <section class="input-section">

            <!-- Ship quick-select -->
            <div class="input-group">
                <label for="shipSelect">Ship</label>
                <select id="shipSelect">
                    <option value="">— Any ship —</option>
                    <optgroup label="Small">
                        <option value="6:1">Nomad (6 SCU)</option>
                        <option value="8:1">Nostromo (8 SCU)</option>
                    </optgroup>
                    <optgroup label="Medium">
                        <option value="66:4">Cutlass Black (66 SCU)</option>
                        <option value="120:4">Freelancer (120 SCU)</option>
                        <option value="180:8">Corsair (180 SCU)</option>
                        <option value="128:4">Spirit C1 (128 SCU)</option>
                        <option value="256:8" selected>Constellation Taurus (256 SCU)</option>
                        <option value="160:4">Valkyrie (160 SCU)</option>
                    </optgroup>
                    <optgroup label="Large">
                        <option value="576:16">Caterpillar (576 SCU)</option>
                        <option value="288:16">Caterpillar Solo (288 SCU)</option>
                        <option value="200:4">Hull A (200 SCU)</option>
                        <option value="500:8">Hull B (500 SCU)</option>
                        <option value="1500:16">Hull C (1500 SCU)</option>
                        <option value="2000:32">Hull D (2000 SCU)</option>
                        <option value="400:16">Starfarer (400 SCU)</option>
                        <option value="240:4">Carrack (240 SCU)</option>
                    </optgroup>
                    <optgroup label="Extra Large">
                        <option value="5000:32">Cargo Bridge (5,000 SCU)</option>
                        <option value="8000:32">Cargo Platform (8,000 SCU)</option>
                        <option value="3200:32">Expanse (3,200 SCU)</option>
                    </optgroup>
                </select>
            </div>

            <!-- SCU input -->
            <div class="input-group">
                <label for="scuInput">SCU</label>
                <div class="input-wrapper">
                    <input
                        type="number"
                        id="scuInput"
                        placeholder="Manual override"
                        min="1"
                        max="16000"
                    >
                    <span class="input-suffix">SCU</span>
                </div>
            </div>

            <!-- System selector -->
            <div class="input-group">
                <label for="systemSelect">System</label>
                <select id="systemSelect">
                    <option value="0">All Systems</option>
                    <option value="68" selected>Stanton</option>
                    <option value="64">Pyro</option>
                    <option value="55">Nyx</option>
                </select>
            </div>

            <!-- Calculate -->
            <div class="input-group btn-group">
                <label>&nbsp;</label>
                <button id="calcBtn" class="btn-primary">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                    Calculate
                </button>
            </div>
        </section>

        <!-- Tab Bar -->
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="all">
                All <span class="tab-count" id="countAll">—</span>
            </button>
            <button class="tab-btn" data-tab="intra">
                Intra-System <span class="tab-count" id="countIntra">—</span>
            </button>
            <button class="tab-btn" data-tab="interstellar">
                <svg class="tab-star" viewBox="0 0 16 16" fill="currentColor" width="10" height="10">
                    <path d="M8 0l2 5h5l-4 3 1.5 5L8 10l-4.5 3L5 8 1 5h5z"/>
                </svg>
                Interstellar <span class="tab-count" id="countInter">—</span>
            </button>
            <button class="tab-btn" data-tab="loops">
                <svg class="tab-star" viewBox="0 0 16 16" fill="currentColor" width="10" height="10">
                    <path d="M8 0a8 8 0 100 16A8 8 0 008 0zm0 2a6 6 0 110 12A6 6 0 018 2zm0 2a4 4 0 100 8 4 4 0 000-8z"/>
                </svg>
                Loops <span class="tab-count" id="countLoops">—</span>
            </button>
        </div>

        <!-- Loading -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <span id="loadingText">Fetching routes from UEX...</span>
        </div>

        <!-- Error -->
        <div id="errorBox" class="error-box hidden"></div>

        <!-- Results -->
        <section id="results" class="results hidden">

            <!-- Summary bar -->
            <div class="summary-bar">
                <div class="summary-item">
                    <span class="summary-label">Top routes</span>
                    <span class="summary-value" id="routeCount">—</span>
                </div>
                <div class="summary-divider"></div>
                <div class="summary-item">
                    <span class="summary-label">Fuel est.</span>
                    <span class="summary-value warning" id="fuelTotal">—</span>
                </div>
                <div class="summary-divider"></div>
                <div class="summary-item">
                    <span class="summary-label">Tab</span>
                    <span class="summary-value" id="tabLabel">—</span>
                </div>
            </div>

            <!-- Routes List -->
            <div id="routesList" class="routes-list"></div>
        </section>

        <!-- Empty State -->
        <section id="emptyState" class="empty-state">
            <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
            </svg>
            <p>Select a ship or enter SCU, then calculate</p>
            <p class="empty-hint">Profit routes with fuel already subtracted</p>
        </section>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <span>Data: <a href="https://uexcorp.space" target="_blank">UEX API</a></span>
        <span class="sep">·</span>
        <span>Net profit = gross − quantum fuel</span>
        <span class="sep">·</span>
        <span id="versionTag">v0.2</span>
    </footer>

    <script src="app.js"></script>
</body>
</html>
